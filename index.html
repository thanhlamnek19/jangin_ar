<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sofa 3D AR</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
</head>
<body style="margin: 0; padding: 0;">

  <model-viewer
    src="sofa.glb"
    alt="Mô hình Sofa 3D"
    ar
    ar-modes="webxr scene-viewer quick-look"
    auto-rotate
    camera-controls
    shadow-intensity="1"
    environment-image="neutral"
    exposure="1.2"
    style="width: 100vw; height: 100dvh;">

    <!-- Nút AR tùy chỉnh nằm giữa bên dưới -->
    <button slot="ar-button" style="position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); background-color: #ffffff; padding: 12px 20px; border-radius: 20px; border: none; font-family: sans-serif; font-weight: bold; cursor: pointer; box-shadow: 0px 4px 10px rgba(0,0,0,0.2);">
      VIEW IN YOUR SPACE
    </button>
    
  </model-viewer>

</body>
</html>
